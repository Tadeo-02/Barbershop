services:
  # Backend Service (connects to remote MySQL)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: barbershop-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
      # Add other env vars as needed
      # AFIP_ACCESS_TOKEN: ${AFIP_ACCESS_TOKEN}
      # AFIP_CUIT: ${AFIP_CUIT}
      # AFIP_ENVIRONMENT: ${AFIP_ENVIRONMENT}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - barbershop-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service (serves React app, proxies to backend)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: barbershop-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - barbershop-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  barbershop-network:
    driver: bridge
