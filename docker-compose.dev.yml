# Development Override Configuration for Docker Compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or add to .env: COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: dev
    # Mount source code for hot reloading
    volumes:
      - ./src/BACK:/app/src/BACK
      - ./prisma:/app/prisma
      - ./tsconfig.backend.json:/app/tsconfig.backend.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./index.ts:/app/index.ts
      - /app/node_modules # Prevent host node_modules from overwriting

    # Use watch mode for development
    environment:
      NODE_ENV: development

    # Restart on file changes
    command: pnpm run dev:backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    # Mount source code for Vite hot module reloading (HMR)
    volumes:
      - ./src/FRONT:/app/src/FRONT
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules

    environment:
      NODE_ENV: development
